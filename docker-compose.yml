services:
  backend:
    build: ./backend
    container_name: ExTracker-backend
    ports:
      - "5208:8080"
    environment:
      - NODE_ENV=production
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: ExTracker-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://backend:5208
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
